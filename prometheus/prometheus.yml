global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertes
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# Scrape configs
scrape_configs:
  # Observer metrics
  - job_name: 'network-observer'
    static_configs:
      - targets: ['localhost:8080']
    
  # Neo4j metrics
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    
  # Elasticsearch
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    
  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    
  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
