services:
  # Main Network Observer Agent
  observer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-network-observer
    network_mode: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    environment:
      - CAPTURE_INTERFACE=ens33
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.197.1:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - ENABLE_LLM=true
    # Neo4j
      - NEO4J_URI=bolt://localhost:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=networksecurity
      
      # Prometheus
      - PROMETHEUS_PORT=8080
      
      # Logging
      - LOG_LEVEL=INFO

    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./output:/app/output
      - ./config:/app/config:ro
   
    command: ["-i", "ens33", "--duration", "1", "--enable-llm"]
    restart: "unless-stopped"  # FIX: String au lieu de no
    
  neo4j:
    image: neo4j:5.14
    container_name: network-graph-db
    # PROFILE SUPPRIMÉ ICI
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/networksecurity
      - NEO4J_PLUGINS=["graph-data-science", "apoc"]
      # AJOUT : Force l'écoute pour l'accès externe
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_memory_heap_max__size=384M
      - NEO4J_server_memory_pagecache_size=256M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: network-logs-db
    # PROFILE SUPPRIMÉ ICI
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.0
    container_name: network-dashboard
    # PROFILE SUPPRIMÉ ICI
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=networksecurity
      - GF_PLUGINS_ALLOW_LOCAL_MODE=true
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/plugins:/var/lib/grafana/plugins
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: network-metrics
    # PROFILE SUPPRIMÉ ICI
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
  neo4j_logs:
  es_data:
  grafana_data:
  prometheus_data:

networks:
  default:
    name: network-observer-net
